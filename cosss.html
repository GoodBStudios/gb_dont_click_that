<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga Cebularzowa - Pro Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --color-bg: #f3e9d9; --color-primary: #0a0e1a; --color-gold: #c5a059; --color-green: #4ade80; }
        body { background-color: var(--color-bg); color: var(--color-primary); font-family: 'Plus Jakarta Sans', sans-serif; background-image: url('https://www.transparenttextures.com/patterns/checkerboard.png'); }
        .glass { background: rgba(10, 14, 26, 0.98); color: #fff; border: 2px solid var(--color-gold); border-radius: 24px; }
        .tab-btn { padding: 12px 24px; font-weight: 800; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.3s; border-bottom: 3px solid transparent; color: #64748b; }
        .tab-btn.active { color: var(--color-gold); border-bottom-color: var(--color-gold); }
        .score-input { background: #1a2235; border: 1px solid var(--color-gold); color: var(--color-green); border-radius: 6px; width: 45px; height: 35px; text-align: center; font-weight: 800; outline: none; }
        .search-input { background: rgba(255,255,255,0.05); border: 1px solid var(--color-gold); color: white; border-radius: 12px; padding: 10px 15px; width: 100%; outline: none; transition: all 0.3s; }
        .search-input:focus { background: rgba(255,255,255,0.1); box-shadow: 0 0 15px rgba(197, 160, 89, 0.2); }
        .btn-cebula { background: var(--color-gold); color: var(--color-primary); font-weight: 900; border: 2px solid var(--color-primary); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-[#0a0e1a] p-4 sticky top-0 z-[100] border-b-4 border-[--color-gold] shadow-2xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <span class="text-3xl">🧅</span>
                <h1 class="text-xl font-black italic text-white uppercase">LIGA <span style="color: var(--color-gold)">CEBULARZOWA</span></h1>
            </div>
            
            <div id="nav-tabs-container" class="hidden flex gap-2">
                <button onclick="switchTab('standing')" class="tab-btn active" id="btn-standing">Ranking</button>
                <button onclick="switchTab('matches')" class="tab-btn" id="btn-matches">Mecze</button>
            </div>

            <button onclick="resetTournament()" class="text-[9px] font-bold text-red-400 border border-red-900/40 px-2 py-1 rounded">RESET</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <section id="setup-view" class="max-w-xl mx-auto mt-10 glass p-8 shadow-2xl space-y-6">
            <div class="text-center">
                <h2 class="text-2xl font-black text-[--color-gold] uppercase">Nowa Liga</h2>
                <p class="text-slate-400 text-xs mt-1">Kolejność wpisania = Kolejność w grupach</p>
            </div>
            <textarea id="player-input" rows="8" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white outline-none" placeholder="Jan Kowalski&#10;Anna Nowak..."></textarea>
            <div class="grid grid-cols-2 gap-4">
                <select id="group-size" class="bg-slate-900 border border-slate-700 p-3 rounded-xl text-sm text-white">
                    <option value="4" selected>Po 4 osoby</option>
                    <option value="8">Po 8 osób</option>
                </select>
                <button onclick="startApp()" class="btn-cebula py-3 rounded-xl uppercase text-xs tracking-widest">Generuj</button>
            </div>
        </section>

        <div id="dashboard" class="hidden">
            <div id="tab-standing" class="tab-content grid grid-cols-1 md:grid-cols-2 gap-8"></div>

            <div id="tab-matches" class="tab-content hidden space-y-6">
                <div class="max-w-md mx-auto sticky top-24 z-[90]">
                    <div class="glass p-4 !rounded-2xl shadow-2xl">
                        <input type="text" id="match-search" oninput="renderMatches()" placeholder="🔍 Szukaj zawodnika..." class="search-input">
                    </div>
                </div>
                <div id="matches-list" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        let state = { active: false, currentTab: 'standing', groups: [] };

        function save() { localStorage.setItem('ligaCebularzowaDataSearch', JSON.stringify(state)); }

        function load() {
            const saved = localStorage.getItem('ligaCebularzowaDataSearch');
            if (saved) {
                state = JSON.parse(saved);
                if (state.active) {
                    document.getElementById('setup-view').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    document.getElementById('nav-tabs-container').classList.remove('hidden');
                    renderAll();
                    switchTab(state.currentTab);
                }
            }
        }

        function resetTournament() {
            if(confirm("Zresetować wszystko?")) {
                localStorage.removeItem('ligaCebularzowaDataSearch');
                location.reload();
            }
        }

        function startApp() {
            const players = document.getElementById('player-input').value.trim().split('\n').filter(n => n.trim() !== "");
            if(players.length < 2) return alert("Brak graczy!");
            
            const size = parseInt(document.getElementById('group-size').value);
            state.active = true;
            state.groups = [];

            for(let i=0; i < players.length; i += size) {
                const names = players.slice(i, i + size);
                const g = {
                    id: String.fromCharCode(65 + (i/size)),
                    players: names.map(n => ({name: n, pts: 0, gf: 0, ga: 0, mp: 0})),
                    matches: []
                };
                for(let j=0; j<names.length; j++) 
                    for(let k=j+1; k<names.length; k++) 
                        g.matches.push({p1:names[j], p2:names[k], s1:null, s2:null});
                state.groups.push(g);
            }
            save();
            location.reload();
        }

        function switchTab(tab) {
            state.currentTab = tab;
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            document.getElementById(`btn-${tab}`).classList.add('active');
            save();
        }

        function updateScore(gIdx, mIdx, s1, s2) {
            const g = state.groups[gIdx];
            g.matches[mIdx].s1 = s1==='' ? null : parseInt(s1);
            g.matches[mIdx].s2 = s2==='' ? null : parseInt(s2);
            
            g.players.forEach(p => Object.assign(p, {pts:0, gf:0, ga:0, mp:0}));
            g.matches.forEach(m => {
                if(m.s1 !== null && m.s2 !== null) {
                    const p1 = g.players.find(p => p.name === m.p1);
                    const p2 = g.players.find(p => p.name === m.p2);
                    p1.mp++; p2.mp++; p1.gf += m.s1; p1.ga += m.s2; p2.gf += m.s2; p2.ga += m.s1;
                    if(m.s1 > m.s2) p1.pts += 3; else if(m.s2 > m.s1) p2.pts += 3; else {p1.pts += 1; p2.pts += 1;}
                }
            });
            g.players.sort((a,b) => b.pts - a.pts || (b.gf-b.ga) - (a.gf-a.ga));
            save();
            renderStanding();
        }

        function renderStanding() {
            document.getElementById('tab-standing').innerHTML = state.groups.map((g, gIdx) => `
                <div class="glass overflow-hidden shadow-xl">
                    <div class="p-4 bg-black/40 border-b border-[--color-gold] font-black text-[--color-gold]">GRUPA ${g.id}</div>
                    <table class="w-full text-sm">
                        <tr class="bg-black/20 text-slate-500 text-[10px] font-bold uppercase"><th class="p-4 text-left">Gracz</th><th class="p-4 text-center">M</th><th class="p-4 text-right pr-6 text-green-400">PKT</th></tr>
                        ${g.players.map((p,i) => `
                            <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                                <td class="p-4 font-bold truncate max-w-[160px]"><span class="text-[--color-gold] mr-2">${i+1}.</span>${p.name}</td>
                                <td class="p-4 text-center text-slate-400 font-mono">${p.mp}</td>
                                <td class="p-4 text-right pr-6 font-black text-green-400">${p.pts}</td>
                            </tr>
                        `).join('')}
                    </table>
                </div>
            `).join('');
        }

        function renderMatches() {
            const query = document.getElementById('match-search').value.toLowerCase();
            let html = "";
            
            state.groups.forEach((g, gIdx) => {
                g.matches.forEach((m, mIdx) => {
                    if(m.p1.toLowerCase().includes(query) || m.p2.toLowerCase().includes(query)) {
                        html += `
                            <div class="glass p-5 flex items-center justify-between border-slate-800 relative group transition-all hover:border-[--color-gold]">
                                <div class="absolute -top-2 left-4 bg-[--color-gold] text-[--color-primary] px-2 py-0.5 rounded text-[8px] font-black">GRUPA ${g.id}</div>
                                <span class="w-[35%] text-right font-bold text-xs truncate ${m.s1 > m.s2 ? 'text-green-400' : ''}">${m.p1}</span>
                                <div class="flex gap-2 mx-3">
                                    <input type="number" onchange="updateScore(${gIdx},${mIdx},this.value,${m.s2})" value="${m.s1??''}" class="score-input" placeholder="-">
                                    <input type="number" onchange="updateScore(${gIdx},${mIdx},${m.s1},this.value)" value="${m.s2??''}" class="score-input" placeholder="-">
                                </div>
                                <span class="w-[35%] text-left font-bold text-xs truncate ${m.s2 > m.s1 ? 'text-green-400' : ''}">${m.p2}</span>
                            </div>
                        `;
                    }
                });
            });
            document.getElementById('matches-list').innerHTML = html || `<div class="col-span-full text-center p-10 text-slate-500 italic">Nie znaleziono meczów dla "${query}"</div>`;
        }

        function renderAll() {
            renderStanding();
            renderMatches();
        }

        window.onload = load;
    </script>
</body>
</html>
